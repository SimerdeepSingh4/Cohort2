<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram reels section</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <main>
        <section>
            <div class="all-reels">

                <div class="reel">
                    <video id="'main-img" src="./reels/cooking.mp4" alt="" autoplay muted loop></video>
                    <i class="ri-heart-3-fill"></i>
                    <div class="bottom">
                        <div class="user">
                            <div class="user-profile">
                                <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
                            <h4>simerdeep.singh</h4>
                            </div>
                            <button>Follow</button>
                        </div>
                        <h3>E-commerce Changes: Adapting to the Future #shorts</h3>
                    </div>
                    <div class="right">
                        <div class="like">
                            <h4 class="like-icon"><i class="ri-heart-line"></i></h4>
                            <h6>200</h6>
                        </div>
                        <div class="comments">
                            <h4 class="comment-icon"><i class="ri-chat-3-line"></i></h4>
                            <h6>69</h6>
                        </div>
                        <div class="share">
                            <h4 class="share-icon"><i class="ri-share-forward-line"></i></h4>
                            <h6>88</h6>
                        </div>
                        <div class="menu">
                            <h4 class="menu-icon"><i class="ri-more-2-fill"></i></h4>
                        </div>
                    </div>
                </div>
                
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
