<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Practice</title>

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
            color: white;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background-color: #222;
        }

        main {
            width: 100%;
            height: 100%;
            background-color: black;
            display: grid;
            grid-template-columns: 1fr 300px 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            grid-gap: 10px;
            padding: 10px;
            grid-template-areas:
                "left-up top-center top-right"
                "left-up center bottom-right"
                "left-bottom left-bottom bottom-right";
        }

        #left-up {
            background-color: crimson;
            grid-area: left-up;
        }

        #left-bottom {
            background-color: lightseagreen;
            grid-area: left-bottom;
        }

        #top-center {
            background-color: darksalmon;
            grid-area: top-center;
        }

        #top-right {
            background-color: dodgerblue;
            grid-area: top-right;
        }

        #bottom-right {
            background-color: darkgoldenrod;
            grid-area: bottom-right;
        }

        #center {
            background-color: fuchsia;
            grid-area: center;
        }
    </style>
</head>

<body>
    <main>
        <div id="left-up">left-up</div>
        <div id="left-bottom">left-bottom</div>
        <div id="top-center">top-center</div>
        <div id="top-right">top-right</div>
        <div id="bottom-right">bottom-right</div>
        <div id="center">center</div>
    </main>
</body>

</html>
