<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiderman UI</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div id="top"><i class="buds ri-headphone-fill"></i> <img src="https://i.pinimg.com/1200x/ed/14/ea/ed14ea822462d93c926056fcfd9db4c5.jpg" alt="">
            <p>30 Fer 30 (with Ke <br> SZA</p>
            <i class="pause ri-pause-large-line"></i>
            <i class="rewind ri-rewind-fill"></i>
            <i class="forward ri-speed-fill"></i>
            <div></div>
        </div>
        <div id="top-left-circle">
            <i class="ri-contrast-fill"></i>
        </div>
        <div id="top-right-circle"><i class="ri-gps-fill"></i></div>
        <div id="low"><i class="ri-battery-low-line"></i> <p>Low Power <br> Mode</p></div>
        <div id="brightness"><i class="ri-sun-fill"></i></div>
        <div id="network">
            <i class="plane ri-plane-line"></i>
            <i class="ht ri-hotspot-fill"></i>
            <i class="wifi ri-wifi-line"></i>
            <div>
                <i class="rss ri-rss-fill"></i>
                <i class="map ri-map-pin-2-fill"></i>
                <i class="bt ri-bluetooth-line"></i>
                <i class="flash ri-lightbulb-fill"></i>
            </div>
            
        </div>
        <div id="earbuds"> <div></div> <h1><i class="ri-headphone-fill"></i></h1></div>
        <div id="bot-left-circle"><i class="ri-settings-3-fill"></i></div>
        <div id="bot-right-circle"><i class="ri-notification-off-line"></i></div>
        <div id="DND"><i class="ri-moon-fill"></i><p>Do Not <br> Disturb <br>On</p></div>
        <div id="screen"><i class="ri-cast-line"></i> <p>Screen Mirroring <br>Off</p></div>
        <div id="orientation"><i class="ri-rotate-lock-line"></i> <p>Orientation <br> Locked</p></div>
    </main>
</body>
</html>
