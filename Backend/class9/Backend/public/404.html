<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: sans-serif;
        color: white;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background-color: #222;
      }

      :root {
        --rx: 300px;
        --ry: 100px;
      }

      body {
        overflow: hidden;
        background-image: url(https://speckyboy.com/wp-content/uploads/2022/02/404-page-web-design-inspiration-42.jpg);
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;

      }

      .box {
        height: 100%;
        width: 100%;
        background: radial-gradient(
          200px at var(--rx) var(--ry),
          rgba(255, 255, 255, 0.7),
          rgba(0, 0, 0, 0.988)
        );
        position: absolute;
      }
    </style>
  </head>
  <body>
    <body>
    <div class="box"></div>
    <script>
      addEventListener("mousemove", (e) => {

        document.body.style.setProperty("--rx", e.clientX + "px");
        document.body.style.setProperty("--ry", e.clientY + "px");
      });
    </script>
  </body>
</html>
